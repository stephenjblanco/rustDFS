syntax = "proto3";

package name_node;

service NameNode {
    rpc WriteData (WriteRequest) returns (WriteResponse);
    rpc ReadData (ReadRequest) returns (ReadResponse);
}

message WriteRequest {
    string fileName = 1;
    int64 size = 2;
    bytes data = 3;
}

message WriteResponse {
    bool success = 1;
}

message ReadRequest {
    string fileName = 1;
}

message ReadResponse {
    string fileName = 1;
    int64 size = 2;
    bytes data = 3;
}
