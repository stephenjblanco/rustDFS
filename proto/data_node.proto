syntax = "proto3";

package data_node;

service DataNode {
    rpc WriteData (WriteRequest) returns (WriteResponse);
    rpc ReadData (ReadRequest) returns (ReadResponse);
    rpc Ping (PingMessage) returns (PingMessage);
}

message WriteRequest {
    string blockID = 1;
    bytes data = 2;
    repeated string replicaNodeIds = 3;
}

message WriteResponse {
    bool success = 1;
}

message ReadRequest {
    string blockID = 1;
}

message ReadResponse {
    bytes data = 1;
}

message PingMessage {
    string nodeID = 1;
    int64 timestamp = 2;
}
